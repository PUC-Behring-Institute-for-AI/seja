name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

env:
  IMAGE_NAME: ghcr.io/anomalyco/seja
  COSIGN_KEYLESS: "true"
  ACTIONS_STEP_DEBUG: "false"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e mcp/[dev]

      - name: Lint
        run: ruff check mcp/

      - name: Type check
        run: mypy mcp/

      - name: Test with coverage
        run: pytest tests/ --cov=mcp --cov-report=xml --cov-report=term-missing

      - name: Test invariants
        run: pytest tests/invariants/ -v

      - uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unit,integration,invariants
          token: ${{ secrets.CODECOV_TOKEN }}
        if: github.event_name != 'pull_request'

  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        run: |
          cosign sign ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} --yes

      - name: Sign CLI script
        run: |
          cosign sign-blob scripts/seja \
            --b64 \
            --output-signature scripts/seja.sig \
            --yes

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate \
            --pretty=format:"* %s" \
            $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")..HEAD \
            >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            scripts/seja
            scripts/seja.sig
            sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'

    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: mcp/
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
